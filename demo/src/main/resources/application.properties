# 应用服务 WEB 访问端口
server.port=8088

server.tomcat.uri-encoding=utf-8
spring.datasource.url=jdbc:mysql://localhost:3306/user_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#这里是8.0以上的驱动
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.druid.initial-size=5

spring.datasource.druid.max-active=20

spring.datasource.druid.max-wait=60000

spring.datasource.druid.min-idle=5

#mybatis配置
mybatis-plus.mapper-locations=classpath:/mapper/*.xml
#缓存关闭

mybatis-plus.configuration.cache-enabled=false
#下划线转驼峰
mybatis-plus.configuration.map-underscore-to-camel-case=true

mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.select-strategy=not_empty
mybatis-plus.global-config.db-config.update-strategy=not_empty
mybatis-plus.global-config.db-config.insert-strategy=not_empty

#日志
logging.level.com.example.demo=debug